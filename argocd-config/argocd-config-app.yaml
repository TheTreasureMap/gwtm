# ArgoCD Application to manage ArgoCD cluster configurations
# This should be applied manually to the ArgoCD cluster (one-time bootstrap):
#   kubectl apply -f argocd-config-app.yaml --kubeconfig=/path/to/argocd/kubeconfig --insecure-skip-tls-verify
#
# Once applied, this app will automatically sync cluster configurations from the gwtm repo
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-config
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/TheTreasureMap/gwtm.git
    path: argocd-config
    targetRevision: svelte  # Use same branch as main gwtm deployment
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=false  # argocd namespace already exists
