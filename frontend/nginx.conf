events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
    
    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Emit relative Location headers on redirects (e.g. /alerts/ not https://host/alerts/).
        # Required when running behind a reverse proxy so the redirect URL is not
        # reconstructed from nginx's internal port/scheme.
        absolute_redirect off;

        # Security headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        
        # Handle client-side routing.
        # $uri/index.html probes a file path rather than $uri/ which triggers a
        # directory check and causes nginx to 301 when the route name matches a
        # same-named build output directory (e.g. /alerts -> /alerts/).
        # error_page 403 catches any remaining directory hits (e.g. direct
        # navigation to a trailing-slash URL) and serves the SPA instead.
        error_page 403 =200 /index.html;
        location / {
            try_files $uri $uri/index.html /index.html;
        }
        
        # API proxy to FastAPI backend
        location /api/ {
            proxy_pass http://fastapi-backend:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
        
        # Static assets caching
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
