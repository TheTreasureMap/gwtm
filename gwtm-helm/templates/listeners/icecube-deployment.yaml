{{- if .Values.listeners.enabled }}
# templates/listeners/icecube-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gwtm.fullname" . }}-icecube-listener
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "gwtm.labels" . | nindent 4 }}
    app: icecube-listener
    app.kubernetes.io/component: icecube-listener
spec:
  replicas: 1  # Only one replica per listener to avoid duplicate processing
  strategy:
    type: Recreate  # Important: don't run multiple simultaneously
  selector:
    matchLabels:
      app: icecube-listener
  template:
    metadata:
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/listeners/listener-secrets.yaml") . | sha256sum }}
      labels:
        app: icecube-listener
        app.kubernetes.io/component: icecube-listener
    spec:
      containers:
      - name: icecube-listener
        image: "{{ .Values.listeners.image.repository }}:{{ .Values.listeners.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.listeners.image.pullPolicy }}
        command: ["python", "docker/run_icecube_listener.py"]

        env:
        {{- include "gwtm.listenerEnv" . | nindent 8 }}

        resources:
          {{- toYaml .Values.listeners.icecube.resources | nindent 10 }}

        # Note: Liveness probe removed - container lacks ps/pgrep utilities
        # Kubernetes will still restart the pod if the process exits with error

      # Pod termination grace period for graceful shutdown
      terminationGracePeriodSeconds: 30

      {{- with .Values.listeners.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.listeners.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
