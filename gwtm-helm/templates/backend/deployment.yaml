{{- if .Values.backend.enabled }}
# templates/backend/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.backend.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "gwtm.labels" . | nindent 4 }}
    app: {{ .Values.backend.name }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.backend.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.backend.name }}
    spec:
      initContainers:
      - name: wait-for-db
        image: postgres:14-alpine
        command: ['sh', '-c', 'echo "Testing connection to ${DB_HOST}:${DB_PORT}...";
                 until pg_isready -h ${DB_HOST} -p ${DB_PORT} -U ${DB_USER} -d ${DB_NAME}; do
                 echo "$(date) - Waiting for database at ${DB_HOST}:${DB_PORT}...";
                 echo "Trying to ping database...";
                 nc -v -z -w2 ${DB_HOST} ${DB_PORT} || echo "Network connection failed";
                 sleep 5;
                 done;
                 echo "Database is ready!"']
        env:
        {{- include "gwtm.dbInitEnv" . | nindent 8 }}
      containers:
      - name: flask-app
        image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
        imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
        command: ["/bin/bash", "-c"]
        args:
          - |
            echo "Starting Flask application..."
            echo "Database settings: DB_HOST=$DB_HOST, DB_PORT=$DB_PORT, DB_USER=$DB_USER, DB_NAME=$DB_NAME"
            gunicorn -b 0.0.0.0:{{ .Values.backend.service.targetPort }} src.api_v1:app -t 1000 --log-level debug
        ports:
        - containerPort: {{ .Values.backend.service.targetPort }}
        env:
        {{- include "gwtm.dbEnv" . | nindent 8 }}
        {{- include "gwtm.appSecretEnv" . | nindent 8 }}
        {{- include "gwtm.storageEnv" . | nindent 8 }}
        - name: DEBUG
          value: "{{ .Values.global.environment | eq "development" | ternary "True" "False" }}"
        {{- if .Values.backend.extraEnv }}
        {{- toYaml .Values.backend.extraEnv | nindent 8 }}
        {{- end }}
        {{- if .Values.backend.readinessProbe.enabled }}
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.backend.service.targetPort }}
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        {{- end }}
        {{- if .Values.backend.livenessProbe.enabled }}
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.backend.service.targetPort }}
          initialDelaySeconds: 60
          periodSeconds: 20
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        {{- end }}
        resources:
          {{- toYaml .Values.backend.resources | nindent 12 }}
      volumes:
      - name: db-user
        secret:
          secretName: {{ include "gwtm.secretName" . }}
          items:
          - key: db-user
            path: db-user
{{- end }}
