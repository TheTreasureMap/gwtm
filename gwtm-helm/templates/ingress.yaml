# templates/ingress.yaml
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "gwtm.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if and .Values.ingress.tls .Values.ingress.host }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      {{- if .Values.ingress.tlsSecretName }}
      secretName: {{ .Values.ingress.tlsSecretName }}
      {{- end }}
  {{- end }}
  rules:
    {{- if .Values.ingress.host }}
    - host: {{ .Values.ingress.host | quote }}
      http:
    {{- else }}
    - http:
    {{- end }}
        paths:
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.fastapi.name }}
                port:
                  number: {{ .Values.fastapi.service.port }}
          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.fastapi.name }}
                port:
                  number: {{ .Values.fastapi.service.port }}
          - path: /redoc
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.fastapi.name }}
                port:
                  number: {{ .Values.fastapi.service.port }}
          - path: /openapi.json
            pathType: Exact
            backend:
              service:
                name: {{ .Values.fastapi.name }}
                port:
                  number: {{ .Values.fastapi.service.port }}
          - path: /health
            pathType: Exact
            backend:
              service:
                name: {{ .Values.fastapi.name }}
                port:
                  number: {{ .Values.fastapi.service.port }}
          - path: /ajax_
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.fastapi.name }}
                port:
                  number: {{ .Values.fastapi.service.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.frontend.name }}
                port:
                  number: {{ .Values.frontend.service.port }}
{{- end }}
{{- if and .Values.ingress.enabled .Values.ingress.tls }}
---
# Redirect HTTP → HTTPS. Referenced via annotation:
# traefik.ingress.kubernetes.io/router.middlewares: <namespace>-https-redirect@kubernetescrd
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: https-redirect
  namespace: {{ .Values.global.namespace }}
spec:
  redirectScheme:
    scheme: https
    permanent: true
{{- end }}
