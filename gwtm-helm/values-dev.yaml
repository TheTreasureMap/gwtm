# values-dev.yaml
global:
  environment: development
  useGeneratedSecrets: true

secrets:
  # Database configuration
  dbUser: "treasuremap"
  dbPassword: "treasuremap"  # Will be randomly generated if not provided
  dbName: "treasuremap"

  # Mail configuration
  mailPassword: "your-mail-password"  # Add actual password for dev environment
  mailUsername: ""
  mailDefaultSender: ""
  mailServer: "smtp.gmail.com"
  mailPort: "465"
  admins: ""

  # AWS credentials
  awsAccessKeyId: "your-awsa-access-key-id"
  awsSecretAccessKey: "your-aws-secret-key"
  awsDefaultRegion: "us-east-2"
  awsBucket: "gwtreasuremap"

  # Azure storage
  azureAccountName: ""  # Set your Azure account name here or in sealed secrets
  azureAccountKey: ""  # Set your Azure account key here or in sealed secrets

  # OpenStack Swift storage - actual credentials in values-secrets.yaml (gitignored)
  osAuthUrl: ""
  osStorageUrl: ""
  osUsername: ""
  osPassword: ""
  osContainerName: "gwtreasuremap"
  osProjectName: ""
  osUserDomainName: "Default"
  osProjectDomainName: "Default"

  storageBucketSource: "swift"

  # reCAPTCHA keys
  recaptchaPublicKey: "your-recaptcha-public-key"
  recaptchaPrivateKey: "your-recaptcha-private-key"

  # Zenodo access
  zenodoAccessKey: "your-zenodo-access-key"

  # Additional configuration
  extraSecrets:
    DEBUG: "True"

fastapi:
  env:
    PUBLIC_API_BASE_URL: "/"
    BASE_URL: "http://gwtm.local:8081"
  replicas: 1
  service:
    type: ClusterIP
  resources:
    limits:
      cpu: 500m
      memory: 500Mi
    requests:
      cpu: 200m
      memory: 300Mi
  readinessProbe:
    enabled: false
  workers: 1

frontend:
  env:
    PUBLIC_API_BASE_URL: "/"
  replicas: 1
  service:
    type: ClusterIP
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi

database:
  persistence:
    enabled: true
    size: 1Gi
  initScripts:
    enabled: true
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi  # Increased for large database restore
    requests:
      cpu: 1000m
      memory: 2Gi

ingress:
  enabled: true
  host: "dev.treasuremap.space"
  className: traefik
  tls: true
  tlsSecretName: gwtm-tls
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: gwtm-https-redirect@kubernetescrd

# Listener configuration for development
# Disabled for local dev - can be enabled once listener issues are resolved
listeners:
  enabled: false
  image:
    tag: "sha-03353dc"

  api:
    base: "http://fastapi-backend:8000/api/v1/"
    token: ""  # Set this for dev testing

  kafka:
    clientId: ""  # Set this for dev testing
    clientSecret: ""  # Set this for dev testing
    offsetReset: "earliest"  # Replay buffered messages for testing
    groupId: "gwtm-dev-listeners"  # Dev consumer group

  storage:
    type: "s3"  # Use S3 for dev, or set to "swift" if available
    s3:
      accessKeyId: ""  # Set this for dev testing
      secretAccessKey: ""  # Set this for dev testing

  # Dev environment - use dry run for initial testing
  dryRun: true  # Override to false once validated
  writeToStorage: false  # Override to true once storage is configured
  verbose: true

  # Dev logging
  logging:
    format: "json"
    level: "DEBUG"  # More verbose for debugging
