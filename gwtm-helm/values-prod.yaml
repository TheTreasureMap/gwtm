# values-prod.yaml
global:
  environment: production
  useGeneratedSecrets: false

ingress:
  host: ""  # No host filter — allow requests by IP (listeners are on a separate cluster)

fastapi:
  image:
    tag: "1.0.4"

frontend:
  replicas: 2
  image:
    tag: "1.0.4"

database:
  persistence:
    size: 20Gi

# Listener configuration for production
listeners:
  image:
    tag: "0.1.0"  # Specific version for prod

  api:
    base: "http://fastapi-backend:8000/api/v1/"
    token: ""  # Will be set via ArgoCD/sealed-secrets

  kafka:
    clientId: ""  # Will be set via ArgoCD/sealed-secrets
    clientSecret: ""  # Will be set via ArgoCD/sealed-secrets
    offsetReset: "earliest"  # Recommended: Replay buffered messages on startup
    groupId: "gwtm-prod-listeners"  # Persistent offset tracking across restarts

  storage:
    type: "swift"
    swift:
      authUrl: "https://your-openstack.example.com:5000/v3"
      storageUrl: "https://your-openstack.example.com:8001/swift/v1"
      username: ""  # Will be set via ArgoCD/sealed-secrets
      password: ""  # Will be set via ArgoCD/sealed-secrets
      projectName: "gwtm-production"
      containerName: "gwtreasuremap"

  # Production behavior
  dryRun: false
  writeToStorage: true
  verbose: true

  # Production logging
  logging:
    format: "json"
    level: "INFO"
